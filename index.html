<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pideyy - Short Your Url</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1220;
  color:#fff;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}
.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}
input,textarea,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}
button{
  background:#22c55e;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
}
.delete-btn{
  background:#ef4444;
}
.item{
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all;
}
img{
  max-width:100%;
  border-radius:10px;
  margin:15px 0;
}
.loader{
  margin:20px auto;
  width:60px;
  height:60px;
  border:5px solid #1f2937;
  border-top:5px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}
.center{
  display:flex;
  flex-direction:column;
  align-items:center;
}
.article{
  line-height:1.8;
}
.article p{
  margin:16px 0;
  text-align:justify;
}
.sticky-cta{
  position:sticky;
  bottom:15px;
  z-index:999;
  margin-top:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}
.stat{
  font-size:24px;
  font-weight:bold;
}
.small{
  font-size:12px;
  color:#94a3b8;
}
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="article.js"></script>
</head>
<body>
<div id="app"></div>

<script>
const app = document.getElementById("app");

const firebaseConfig = {
  apiKey: "AIzaSyBzGiN1aokAnaXHVF38ahFVAdHqSf5n8QY",
  authDomain: "urlin-shortin.firebaseapp.com",
  databaseURL: "https://urlin-shortin-default-rtdb.firebaseio.com",
  projectId: "urlin-shortin",
  storageBucket: "urlin-shortin.firebasestorage.app",
  messagingSenderId: "401542928080",
  appId: "1:401542928080:web:53d4d79b7b76eb6141b0d5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DOMAIN = "https://pideyy.biz.id";
const PIN = "270491";

function getRedirectTime(){
  return parseInt(localStorage.getItem("redirect_time")) || 1;
}

function saveRedirectTime(){
  const val = parseInt(document.getElementById("redirectTime").value);
  if(!val || val < 1) return alert("Minimum 1 second");
  localStorage.setItem("redirect_time", val);
  alert("Saved");
}

function normalize(url){
  return /^https?:\/\//i.test(url) ? url : "https://" + url;
}

function randomCode(){
  return Math.random().toString(36).substring(2,7);
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied");
}

function login(){
  const pinInput = document.getElementById("pin");
  if(pinInput.value === PIN){
    localStorage.setItem("pin", PIN);
    dashboard();
  }else{
    alert("Wrong PIN");
  }
}

function isLogin(){
  return localStorage.getItem("pin") === PIN;
}

function showPin(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Enter PIN</h2>
        <input id="pin" type="password">
        <button onclick="login()">Unlock</button>
      </div>
    </div>
  `;
}

function saveHistory(code,url){
  db.ref("history/"+code).set({
    code,
    url,
    clicks:0,
    createdAt:new Date().toLocaleString()
  });
}

function deleteHistory(code){
  if(!confirm("Delete this history?")) return;

  db.ref("history/"+code).remove().then(()=>{
    db.ref("links/"+code).remove();
    loadAnalysis();
  });
}

function clearAllHistory(){
  if(!confirm("Delete all history?")) return;

  db.ref("history").remove().then(()=>{
    loadAnalysis();
  });
}

function updateClick(code){
  db.ref("history/"+code).transaction(data=>{
    if(data){
      data.clicks = (data.clicks || 0) + 1;
    }
    return data;
  });
}

function generate(){
  let url = document.getElementById("urlInput").value.trim();
  if(!url) return alert("Enter URL");

  url = normalize(url);
  const code = randomCode();

  db.ref("links/"+code).set({url});
  saveHistory(code,url);

  document.getElementById("result").innerHTML = `
    <div class="item">
      ${DOMAIN}/#${code}
      <button onclick="copyText('${DOMAIN}/#${code}')">Copy</button>
    </div>
  `;

  loadAnalysis();
}

function bulk(){
  const lines = document.getElementById("bulkInput")
    .value.split("\n")
    .filter(x=>x.trim());

  let html = "";

  lines.forEach(link=>{
    const code = randomCode();
    const url = normalize(link);

    db.ref("links/"+code).set({url});
    saveHistory(code,url);

    html += `<div class="item">${DOMAIN}/#${code}</div>`;
  });

  document.getElementById("bulkResult").innerHTML = html;
  loadAnalysis();
}

function loadAnalysis(){
  db.ref("history").once("value").then(snap=>{
    const data = snap.val() || {};
    let totalLinks = 0;
    let totalClicks = 0;
    let historyHTML = "";

    Object.values(data).forEach(item=>{
      totalLinks++;
      totalClicks += item.clicks || 0;

      historyHTML += `
        <div class="item">
          <strong>${DOMAIN}/#${item.code}</strong>
          <p>Clicks: ${item.clicks || 0}</p>
          <p>${item.createdAt}</p>

          <div class="actions">
            <button onclick="copyText('${DOMAIN}/#${item.code}')">Copy</button>
            <button class="delete-btn" onclick="deleteHistory('${item.code}')">
              Delete
            </button>
          </div>
        </div>
      `;
    });

    document.getElementById("analysis").innerHTML = `
      <div class="grid">
        <div class="card">
          <div class="stat">${totalLinks}</div>
          <div class="small">Total Links</div>
        </div>
        <div class="card">
          <div class="stat">${totalClicks}</div>
          <div class="small">Total Clicks</div>
        </div>
      </div>

      <div class="card">
        <h2>History</h2>
        <button class="delete-btn" onclick="clearAllHistory()">
          Clear All History
        </button>
        ${historyHTML || "<p>No history yet</p>"}
      </div>
    `;
  });
}

function dashboard(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Create Shortlink</h2>
        <input id="urlInput" placeholder="Enter URL">
        <button onclick="generate()">Generate</button>
        <div id="result"></div>
      </div>

      <div class="card">
        <h2>Bulk Generator</h2>
        <textarea id="bulkInput" rows="5"></textarea>
        <button onclick="bulk()">Generate Bulk</button>
        <div id="bulkResult"></div>
      </div>

      <div class="card">
        <h2>Redirect Settings</h2>
        <input id="redirectTime" type="number" min="1" value="${getRedirectTime()}">
        <button onclick="saveRedirectTime()">Save</button>
      </div>

      <div id="analysis"></div>
    </div>
  `;

  loadAnalysis();
}

function redirectPage(target,code){
  if(!target){
    app.innerHTML = "<h2 style='text-align:center'>Invalid URL</h2>";
    return;
  }

  updateClick(code);

  let sec = getRedirectTime();
  const article = getRandomArticle();

  app.innerHTML = `
    <div class="container">
      <div class="card">
        <div class="article">
          <small>
            ${article.category.toUpperCase()} •
            ${article.publishDate} •
            ${article.author} •
            ${article.readTime}
          </small>
          <h2>${article.title}</h2>
          <small>/${article.slug}</small>
          <p><i>${article.metaDescription}</i></p>

          <div class="sticky-cta">
            <a href="https://whatsapp.com/channel/0029Vb7Vvuu89inibofPFy3Q" target="_blank">
              <button>Join WhatsApp Channel</button>
            </a>
          </div>
        </div>
        <div class="center">
        <div class="loader"></div>
          <p id="count">Redirect in ${sec} sec</p>
          <img src="https://picsum.photos/900/400?${Date.now()}">
          ${article.content}
        </div>
      </div>
    </div>

  `;

  const timer = setInterval(()=>{
    sec--;
    document.getElementById("count").innerText = "Redirect in " + sec + " sec";

    if(sec <= 0){
      clearInterval(timer);
      window.location.href = target;
    }
  },1000);
}

window.onload = ()=>{
  const code = location.hash.replace("#","");

  if(code){
    db.ref("links/"+code).once("value").then(snap=>{
      const data = snap.val();

      if(data && data.url){
        redirectPage(data.url,code);
      }else{
        app.innerHTML = "<h2 style='text-align:center'>Link not found</h2>";
      }
    });
    return;
  }

  if(isLogin()) dashboard();
  else showPin();
}
</script>
</body>
</html>
